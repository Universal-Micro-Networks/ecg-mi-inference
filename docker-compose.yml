# リポジトリ直下の .env を読み込み:
# - Compose ファイル内の ${VAR} 展開（プロジェクトディレクトリの .env が自動で対象）
# - 各サービスの env_file によりコンテナ環境変数としても注入
services:
  # Frontend service (Vite React development server)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ecg-mi-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8200/api}
      - VITE_PROXY_TARGET=${VITE_PROXY_TARGET:-http://backend:8000}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ecg-mi-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:5173",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Backend service (FastAPI/Uvicorn)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ecg-mi-backend
    ports:
      - "8200:8000"
    env_file:
      - .env
    environment:
      # 既定はインメモリ。ファイル運用に戻すときは .env で DATABASE_URL=sqlite:////app/data/ecg_mi.db を指定
      - DATABASE_URL=${DATABASE_URL:-sqlite:///:memory:}
      # DB に入る MFER パスをコンテナ内に固定（ホストの絶対パスが .env にあっても上書き）
      - MFER_PROCESSED_FOLDER=/app/processed
      - MFER_ERROR_FOLDER=/app/error
      # .env の MFER_WATCH_FOLDER を優先。未設定時のみ既定値を使って自動取り込みを有効化
      - MFER_WATCH_FOLDER=${MFER_WATCH_FOLDER:-/app/develop/test_data}
      # 空 DB でもデモ患者・診察を投入しない（ローカル uvicorn では未設定のまま従来どおり）
      - ECG_MI_SKIP_SAMPLE_DB_SEED=1
      # セキュリティ優先: 生成物（CSV/ECG画像キャッシュ/推論結果）を永続化しない
      - ECG_MI_EPHEMERAL_MODE=1
      # アプリ内 logger("app.*") の出力レベル（推論詳細ログを表示）
      - APP_LOG_LEVEL=INFO
    volumes:
      - ./backend/app:/app/app
      # BNP 設定など（ホストで編集した内容がそのまま反映。未マウント時はイメージ内の config）
      - ./backend/config:/app/config
      - ./backend/data:/app/data
      # file_importer の移動先（ホスト ./backend/processed と同期）
      - ./backend/processed:/app/processed
      - ./backend/error:/app/error
      # MFER 監視用（.env の MFER_WATCH_FOLDER を /app/develop/... に合わせる）
      - ./develop:/app/develop
    networks:
      - ecg-mi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ecg-mi-network:
    driver: bridge
