repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.16.4
    hooks:
      - id: gitleaks

  # Frontend + Backend: Local hooks
  - repo: local
    hooks:
      - id: biome-fix
        name: biome (TypeScript format/lint fix)
        entry: bash -c 'cd frontend && npm run check:fix'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|jsonc)$
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        name: ruff (Python lint)
        args: [--config, backend/pyproject.toml]
        files: ^backend/.*\.py$
      - id: ruff-format
        name: ruff (Python format)
        args: [--config, backend/pyproject.toml]
        files: ^backend/.*\.py$

  - repo: local
    hooks:
      - id: pyright
        name: pyright (Python type check)
        entry: bash -c 'cd backend && uv run pyright --project pyproject.toml'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
