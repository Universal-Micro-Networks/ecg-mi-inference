repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.16.4
    hooks:
      - id: gitleaks

  # Frontend + Backend: Local hooks
  - repo: local
    hooks:
      - id: biome-fix
        name: biome (TypeScript format/lint fix)
        entry: bash -c 'cd frontend && npm run check:fix'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|jsonc)$
        pass_filenames: false

  - repo: local
    hooks:
      - id: ruff-check-backend
        name: ruff (Python lint)
        entry: bash -c 'cd backend && uv run ruff check app/ tests/ --config pyproject.toml'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: ruff-format-backend
        name: ruff (Python format)
        entry: bash -c 'cd backend && uv run ruff format app/ tests/ --config pyproject.toml'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: pyright
        name: pyright (Python type check)
        entry: bash -c 'cd backend && uv run pyright --project pyproject.toml'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
